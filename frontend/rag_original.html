<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RAG Chatbot - Multi Chat</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            /* Color Palette */
            --bg-main: #0B0F19;
            --bg-sidebar: #111827;
            --bg-surface: #1F2937;
            --bg-surface-hover: #374151;
            
            --border-color: #374151;
            
            --text-primary: #F9FAFB;
            --text-secondary: #9CA3AF;
            
            --accent: #6366F1;
            --accent-hover: #4F46E5;
            
            --danger: #EF4444;
            --danger-hover: #DC2626;

            --radius-md: 12px;
            --radius-lg: 16px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 280px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .brand-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent), #8B5CF6);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 18px;
            color: white;
            box-shadow: var(--shadow);
        }

        .brand-text h2 {
            font-size: 16px;
            font-weight: 600;
        }

        .brand-text p {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .new-chat-btn {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 12px;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
            margin-bottom: 20px;
        }

        .new-chat-btn:hover {
            background-color: var(--bg-surface);
            border-color: var(--text-secondary);
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .chat-list::-webkit-scrollbar { width: 4px; }
        .chat-list::-webkit-scrollbar-thumb { background: var(--bg-surface-hover); border-radius: 4px; }

        .chat-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .chat-item:hover {
            background-color: var(--bg-surface);
            color: var(--text-primary);
        }

        .chat-item.active {
            background-color: var(--bg-surface-hover);
            color: var(--text-primary);
            font-weight: 500;
        }

        .chat-item-name {
            display: flex;
            align-items: center;
            gap: 10px;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        .delete-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            opacity: 0;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            padding: 4px;
            border-radius: 6px;
        }

        .chat-item:hover .delete-btn {
            opacity: 1;
        }

        .delete-btn:hover {
            color: var(--danger);
            background-color: rgba(239, 68, 68, 0.1);
        }

        /* --- MAIN AREA --- */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* --- HEADER --- */
        .header {
            height: 64px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            background-color: rgba(11, 15, 25, 0.8);
            backdrop-filter: blur(12px);
            z-index: 5;
        }

        .header-title {
            font-size: 16px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        #uploadStatus {
            font-size: 13px;
            color: var(--text-secondary);
            max-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .upload-btn {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .upload-btn:hover {
            background-color: var(--bg-surface-hover);
            border-color: var(--text-secondary);
        }

        /* --- CHAT AREA --- */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 40px 24px;
            scroll-behavior: smooth;
        }

        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-thumb { background: var(--bg-surface-hover); border-radius: 4px; }

        .messages-wrapper {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .message {
            display: flex;
            gap: 16px;
            opacity: 0;
            animation: fadeIn 0.3s ease forwards;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .user .avatar {
            background-color: var(--bg-surface);
            color: var(--text-secondary);
        }

        .assistant .avatar {
            background: linear-gradient(135deg, var(--accent), #8B5CF6);
            color: white;
        }

        .message-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-top: 6px;
        }

        .message-author {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .message-text {
            font-size: 15px;
            line-height: 1.6;
            color: #D1D5DB;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* Citations styling */
        .citations {
            margin-top: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .citation-chip {
            background-color: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            color: #A5B4FC;
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-width: 100%;
        }

        .citation-source {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .citation-snippet {
            color: var(--text-secondary);
            font-style: italic;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Loading Indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 0;
            align-items: center;
        }
        .typing-indicator span {
            width: 6px;
            height: 6px;
            background-color: var(--text-secondary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        /* --- INPUT AREA --- */
        .input-wrapper {
            padding: 24px;
            background: linear-gradient(to top, var(--bg-main) 70%, transparent);
        }

        .input-box {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            display: flex;
            align-items: flex-end;
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 8px 12px;
            box-shadow: var(--shadow);
            transition: border-color 0.2s;
        }

        .input-box:focus-within {
            border-color: var(--accent);
        }

        .input-box textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 15px;
            font-family: inherit;
            resize: none;
            padding: 8px;
            max-height: 200px;
            min-height: 44px;
            outline: none;
            line-height: 1.5;
        }

        .input-box textarea::placeholder {
            color: var(--text-secondary);
        }

        .send-btn {
            background-color: var(--accent);
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-bottom: 4px;
        }

        .send-btn:hover {
            background-color: var(--accent-hover);
        }

        .send-btn:disabled {
            background-color: var(--bg-surface-hover);
            color: var(--text-secondary);
            cursor: not-allowed;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: 260px; border-right: none; border-bottom: 1px solid var(--border-color); padding: 16px; }
            .header { padding: 0 16px; }
            .chat-container { padding: 24px 16px; }
            .input-wrapper { padding: 16px; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="brand">
            <div class="brand-icon"><i data-lucide="bot" size="20"></i></div>
            <div class="brand-text">
                <h2>RAG Assistant</h2>
                <p>Knowledge Base</p>
            </div>
        </div>

        <button class="new-chat-btn" id="newChatBtn">
            <i data-lucide="plus" size="18"></i> New Chat
        </button>

        <div class="chat-list" id="chatList">
            </div>
    </aside>

    <main class="main">
        
        <header class="header">
            <div class="header-title" id="currentChatTitle">
                <i data-lucide="message-square" size="18"></i> <span>Select a chat</span>
            </div>
            
            <div class="header-actions">
                <span id="uploadStatus"></span>
                <input type="file" id="fileInput" multiple accept=".pdf,.docx,.txt" hidden />
                <button class="upload-btn" id="triggerUploadBtn">
                    <i data-lucide="paperclip" size="16"></i> Add Docs
                </button>
            </div>
        </header>

        <div class="chat-container" id="scrollContainer">
            <div class="messages-wrapper" id="chatBox">
                </div>
        </div>

        <div class="input-wrapper">
            <div class="input-box">
                <textarea 
                    id="questionInput" 
                    placeholder="Ask a question about your documents..." 
                    rows="1"
                ></textarea>
                <button class="send-btn" id="sendBtn">
                    <i data-lucide="arrow-up" size="20"></i>
                </button>
            </div>
        </div>

    </main>

    <script>
        // Initialize Icons
        lucide.createIcons();

        let currentChatId = null;
        let isProcessing = false;

        // Utility: Escape HTML
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Auto-resize textarea
        const textarea = document.getElementById('questionInput');
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight < 200 ? this.scrollHeight : 200) + 'px';
        });

        // Trigger Hidden File Input
        document.getElementById('triggerUploadBtn').addEventListener('click', () => {
            if (!currentChatId) {
                alert("Please select or create a chat first.");
                return;
            }
            document.getElementById('fileInput').click();
        });

        // Auto Upload when files selected
        document.getElementById('fileInput').addEventListener('change', uploadToCurrentChat);

        // API Calls
        async function loadChats() {
            try {
                const res = await fetch('/chats');
                const chats = await res.json();
                
                const container = document.getElementById('chatList');
                container.innerHTML = '';

                for (let chat of chats) {
                    const div = document.createElement('div');
                    div.className = 'chat-item' + (currentChatId === chat.chat_id ? ' active' : '');
                    
                    div.innerHTML = `
                        <div class="chat-item-name">
                            <i data-lucide="message-square" size="16"></i>
                            <span>${escapeHtml(chat.name)}</span>
                        </div>
                        <button class="delete-btn" title="Delete chat">
                            <i data-lucide="trash-2" size="16"></i>
                        </button>
                    `;

                    // Select chat event
                    div.addEventListener('click', () => switchChat(chat.chat_id, chat.name));

                    // Delete chat event
                    const delBtn = div.querySelector('.delete-btn');
                    delBtn.addEventListener('click', async (e) => {
                        e.stopPropagation();
                        if (confirm('Delete this chat? All documents and history will be lost.')) {
                            await fetch(`/chats/${chat.chat_id}`, { method: 'DELETE' });
                            if (currentChatId === chat.chat_id) currentChatId = null;
                            await loadChats();
                            
                            if (currentChatId === null) {
                                const remaining = await (await fetch('/chats')).json();
                                if (remaining.length > 0) {
                                    switchChat(remaining[0].chat_id, remaining[0].name);
                                } else {
                                    await createNewChat();
                                }
                            }
                        }
                    });

                    container.appendChild(div);
                }

                lucide.createIcons({ root: container });

                if (!currentChatId && chats.length > 0) {
                    await switchChat(chats[0].chat_id, chats[0].name);
                } else if (chats.length === 0) {
                    await createNewChat();
                }

            } catch (err) {
                console.error('loadChats error:', err);
            }
        }

        async function createNewChat() {
            const name = prompt("Enter chat name:", "New Chat");
            if (!name) return;

            const formData = new FormData();
            formData.append('name', name);

            const res = await fetch('/chats/new', { method: 'POST', body: formData });
            const data = await res.json();

            await loadChats();
            await switchChat(data.chat_id, name);
        }

        async function switchChat(chatId, chatName) {
            if (currentChatId === chatId) return;
            currentChatId = chatId;
            
            // Update Header Title
            const titleEl = document.getElementById('currentChatTitle');
            titleEl.innerHTML = `<i data-lucide="message-square" size="18"></i> <span>${escapeHtml(chatName || 'Conversation')}</span>`;
            lucide.createIcons({ root: titleEl });

            document.getElementById('uploadStatus').innerText = '';

            await loadChats(); // Refreshes active state in sidebar
            await loadChatHistory();
        }

        async function loadChatHistory() {
            const chatBox = document.getElementById('chatBox');
            chatBox.innerHTML = '';

            if (!currentChatId) {
                renderPlaceholder();
                return;
            }

            try {
                const res = await fetch(`/chats/${currentChatId}/history`);
                const data = await res.json();

                if (data.history.length === 0) {
                    renderPlaceholder();
                } else {
                    for (let msg of data.history) {
                        renderMessage(msg.role, msg.content, msg.citations);
                    }
                }
            } catch (err) {
                console.error('loadChatHistory error:', err);
            }
        }

        function renderPlaceholder() {
            const chatBox = document.getElementById('chatBox');
            chatBox.innerHTML = `
                <div style="text-align: center; color: var(--text-secondary); margin-top: 40px;">
                    <div style="margin-bottom: 16px;"><i data-lucide="file-text" size="48" style="opacity: 0.5;"></i></div>
                    <h3>Welcome to RAG Assistant</h3>
                    <p style="margin-top: 8px; font-size: 14px;">Upload documents in the top right to get started.</p>
                </div>
            `;
            lucide.createIcons({ root: chatBox });
        }

        async function uploadToCurrentChat() {
            if (!currentChatId) return;

            const input = document.getElementById('fileInput');
            const files = input.files;
            if (files.length === 0) return;

            const statusDiv = document.getElementById('uploadStatus');
            statusDiv.style.color = "var(--text-primary)";
            statusDiv.innerText = 'Uploading...';

            const formData = new FormData();
            for (let file of files) { formData.append('files', file); }

            try {
                const res = await fetch(`/chats/${currentChatId}/upload`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();

                if (res.ok) {
                    statusDiv.style.color = "#34D399"; // Green
                    statusDiv.innerText = `Success: ${data.chunks} chunks loaded.`;
                    setTimeout(() => { statusDiv.innerText = ''; }, 4000);
                } else {
                    statusDiv.style.color = "var(--danger)";
                    statusDiv.innerText = "Error: " + (data.detail || "Unknown error");
                }
            } catch (err) {
                statusDiv.style.color = "var(--danger)";
                statusDiv.innerText = "Upload failed.";
            } finally {
                input.value = ''; // reset
            }
        }

        async function askQuestion() {
            if (!currentChatId || isProcessing) return;

            const questionInput = document.getElementById('questionInput');
            const question = questionInput.value.trim();
            if (!question) return;

            // Clear placeholder if it exists
            const placeholder = document.querySelector('#chatBox > div[style*="text-align: center"]');
            if (placeholder) placeholder.remove();

            // Render User Message
            renderMessage('user', question);
            
            // Reset input
            questionInput.value = '';
            questionInput.style.height = 'auto';
            isProcessing = true;
            document.getElementById('sendBtn').disabled = true;

            // Render Loading Indicator
            const loaderId = 'loader-' + Date.now();
            renderLoading(loaderId);

            const formData = new FormData();
            formData.append('question', question);

            try {
                const res = await fetch(`/chats/${currentChatId}/chat`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();

                removeElement(loaderId);

                if (res.ok) {
                    renderMessage('assistant', data.answer, data.citations || []);
                } else {
                    renderMessage('assistant', "Error: " + (data.detail || "Unknown error"));
                }
            } catch (err) {
                removeElement(loaderId);
                renderMessage('assistant', "Request failed: " + err.message);
            } finally {
                isProcessing = false;
                document.getElementById('sendBtn').disabled = false;
                questionInput.focus();
            }
        }

        function renderMessage(role, content, citations) {
            const chatBox = document.getElementById('chatBox');
            const wrapper = document.createElement('div');
            wrapper.className = `message ${role}`;

            const iconName = role === 'user' ? 'user' : 'bot';
            const authorName = role === 'user' ? 'You' : 'Assistant';

            let citationsHtml = '';
            if (role === 'assistant' && citations && citations.length > 0) {
                citationsHtml += '<div class="citations">';
                const seen = new Set();
                let idx = 0;
                for (let c of citations) {
                    const key = c.source + '|' + c.chunk_index;
                    if (seen.has(key)) continue;
                    seen.add(key);
                    idx++;
                    const snippet = c.snippet.length > 100 ? c.snippet.substring(0, 100) + '...' : c.snippet;
                    
                    citationsHtml += `
                        <div class="citation-chip">
                            <span class="citation-source"><i data-lucide="file-text" size="12"></i> [${idx}] ${escapeHtml(c.source)}</span>
                            <span class="citation-snippet">"${escapeHtml(snippet)}"</span>
                        </div>
                    `;
                }
                citationsHtml += '</div>';
            }

            wrapper.innerHTML = `
                <div class="avatar">
                    <i data-lucide="${iconName}" size="20"></i>
                </div>
                <div class="message-content">
                    <div class="message-author">${authorName}</div>
                    <div class="message-text">${escapeHtml(content)}</div>
                    ${citationsHtml}
                </div>
            `;

            chatBox.appendChild(wrapper);
            lucide.createIcons({ root: wrapper });
            scrollToBottom();
        }

        function renderLoading(id) {
            const chatBox = document.getElementById('chatBox');
            const wrapper = document.createElement('div');
            wrapper.className = `message assistant`;
            wrapper.id = id;
            wrapper.innerHTML = `
                <div class="avatar"><i data-lucide="bot" size="20"></i></div>
                <div class="message-content">
                    <div class="message-author">Assistant</div>
                    <div class="typing-indicator"><span></span><span></span><span></span></div>
                </div>
            `;
            chatBox.appendChild(wrapper);
            lucide.createIcons({ root: wrapper });
            scrollToBottom();
        }

        function removeElement(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function scrollToBottom() {
            const scrollContainer = document.getElementById('scrollContainer');
            scrollContainer.scrollTop = scrollContainer.scrollHeight;
        }

        // Event Listeners
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('newChatBtn').addEventListener('click', createNewChat);
            document.getElementById('sendBtn').addEventListener('click', askQuestion);
            
            document.getElementById('questionInput').addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    askQuestion();
                }
            });

            loadChats();
        });
    </script>
</body>
</html>
